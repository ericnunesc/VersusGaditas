<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeonatos BJJ - Gaditas Torneios</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:#F5F7FA; color:#1A2C3E; min-height:100vh; }

    header {
      background:#1A2C3E;
      color:#fff;
      padding:20px 32px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
    }
    .header-logo { display:flex; align-items:center; gap:12px; }
    .header-logo h1 { font-size:1.2rem; font-weight:700; letter-spacing:1px; }
    .header-logo p { font-size:0.7rem; color:#8A9CB0; margin-top:2px; }
    .btn-admin { background:#C9A03D; border:none; color:#fff; padding:9px 20px; border-radius:40px; font-size:0.82rem; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn-admin:hover { background:#A0822E; }

    .hero {
      background:linear-gradient(135deg,#1A2C3E 0%,#2A4060 100%);
      color:#fff;
      text-align:center;
      padding:60px 20px 50px;
    }
    .hero h2 { font-size:2rem; font-weight:800; margin-bottom:12px; }
    .hero p { font-size:1rem; color:#8A9CB0; max-width:500px; margin:0 auto; }

    .app { max-width:1100px; margin:0 auto; padding:32px 20px; }

    .busca-box { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
    .busca-box input { flex:1; min-width:200px; border:1px solid #E2E8F0; border-radius:10px; padding:11px 16px; font-size:0.88rem; outline:none; background:#fff; }
    .busca-box input:focus { border-color:#C9A03D; }
    .busca-box select { border:1px solid #E2E8F0; border-radius:10px; padding:11px 14px; font-size:0.85rem; background:#fff; outline:none; cursor:pointer; }

    .titulo-secao { font-size:0.72rem; font-weight:700; color:#8A9CB0; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

    .card-camp {
      background:#fff;
      border:1px solid #E2E8F0;
      border-radius:16px;
      overflow:hidden;
      transition:transform 0.2s, box-shadow 0.2s;
      text-decoration:none;
      color:inherit;
      display:block;
    }
    .card-camp:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); border-color:#C9A03D; }

    .card-banner {
      background:linear-gradient(135deg,#1A2C3E,#2A4060);
      height:160px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.5rem;
      overflow:hidden;
      position:relative;
    }
    .card-banner img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .card-banner .emoji-sobre { position:relative; z-index:1; }
    .card-body { padding:18px; }
    .card-nome { font-weight:700; font-size:1rem; margin-bottom:6px; }
    .card-info { font-size:0.78rem; color:#8A9CB0; display:flex; flex-direction:column; gap:3px; margin-bottom:12px; }
    .card-info span { display:flex; align-items:center; gap:6px; }
    .card-footer { display:flex; justify-content:space-between; align-items:center; padding:12px 18px; border-top:1px solid #F1F5F9; }
    .status-pill { padding:4px 12px; border-radius:20px; font-size:0.7rem; font-weight:700; }
    .status-ativo { background:#DCFCE7; color:#166534; }
    .status-encerrado { background:#F1F5F9; color:#64748B; }
    .status-breve { background:#FEF9C3; color:#92400E; }
    .btn-inscricao { background:#C9A03D; color:#fff; border:none; padding:7px 16px; border-radius:40px; font-size:0.78rem; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn-inscricao:hover { background:#A0822E; }

    .vazio { text-align:center; padding:60px 20px; color:#8A9CB0; }
    .vazio span { font-size:3rem; display:block; margin-bottom:12px; opacity:0.3; }

    .loading { text-align:center; padding:60px; color:#8A9CB0; }

    @media(max-width:600px){ .hero h2 { font-size:1.4rem; } }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <span style="font-size:2rem">🏆</span>
    <div>
      <h1>GADITAS TORNEIOS</h1>
      <p>Sistema oficial CBJJ/IBJJF</p>
    </div>
  </div>
  <a href="login-admin.html" class="btn-admin">⚙️ Área Admin</a>
</header>

<div class="hero">
  <h2>Campeonatos de Jiu-Jitsu</h2>
  <p>Encontre seu campeonato, consulte sua categoria e faça sua inscrição</p>
</div>

<div class="app">
  <div class="busca-box">
    <input type="text" id="busca" placeholder="🔍 Buscar campeonato..." oninput="filtrar()">
    <select id="filtro-status" onchange="filtrar()">
      <option value="">Todos os status</option>
      <option value="ativo">Abertos</option>
      <option value="breve">Em breve</option>
      <option value="encerrado">Encerrados</option>
    </select>
  </div>

  <div class="titulo-secao">Campeonatos disponíveis</div>
  <div id="grid" class="grid"><div class="loading">Carregando campeonatos...</div></div>
</div>

<script type="module">
  import { listarCampeonatos } from './js/firebase.js';

  let todos = [];

  async function carregar() {
    try {
      todos = await listarCampeonatos();
      filtrar();
    } catch(e) {
      document.getElementById('grid').innerHTML =
        `<div class="vazio"><span>⚠️</span>Erro ao carregar. Verifique a conexão.</div>`;
    }
  }

  window.filtrar = function() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const status = document.getElementById('filtro-status').value;
    const visiveis = todos.filter(c =>
      (!busca || c.nome.toLowerCase().includes(busca) || (c.local||'').toLowerCase().includes(busca)) &&
      (!status || c.status === status)
    );
    renderizar(visiveis);
  };

  function renderizar(lista) {
    const grid = document.getElementById('grid');
    if (!lista.length) {
      grid.innerHTML = `<div class="vazio" style="grid-column:1/-1"><span>🏆</span>Nenhum campeonato encontrado.</div>`;
      return;
    }
    grid.innerHTML = lista.map(c => {
      const data = c.data ? new Date(c.data).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'}) : '—';
      const statusLabel = {ativo:'✅ Inscrições abertas', breve:'🕐 Em breve', encerrado:'🔒 Encerrado'}[c.status] || c.status;
      const statusClass = `status-${c.status || 'ativo'}`;
      const podeInscrever = c.status === 'ativo';
      return `
        <div class="card-camp">
          <div class="card-banner">
            ${c.cartaz ? `<img src="${c.cartaz}" alt="Cartaz ${c.nome}">` : `<span class="emoji-sobre">${c.emoji || '🥋'}</span>`}
          </div>
          <div class="card-body">
            <div class="card-nome">${c.nome}</div>
            <div class="card-info">
              <span>📅 ${data}</span>
              ${c.local ? `<span>📍 ${c.local}</span>` : ''}
              ${c.descricao ? `<span>📝 ${c.descricao}</span>` : ''}
            </div>
          </div>
          <div class="card-footer">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a href="atletas-publico.html?id=${c.id}" style="font-size:0.78rem;color:#1A2C3E;text-decoration:none;padding:7px 14px;border:1px solid #E2E8F0;border-radius:40px;font-weight:600;">👥 Atletas cadastrados</a>
              ${podeInscrever ? `<a href="inscricao.html?id=${c.id}" class="btn-inscricao">📝 Inscrever</a>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  carregar();
</script>
</body>
</html>
