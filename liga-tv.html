<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Ao Vivo — Liga BJJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ouro:#C9A03D;--ouro-esc:#A0822E;
      --bg:#060608;--bg2:#0E0E12;--bg3:#161620;--borda:#1E1E2A;
      --txt:#E8E8F0;--txt-fraco:#5A5A7A;
      --verde:#00E68A;--azul:#3B8BFF;--vermelho:#FF4444;--laranja:#F59E0B;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(201,160,61,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
    .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 16px 40px;}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 14px;border-bottom:1px solid var(--borda);margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .header-left{display:flex;align-items:center;gap:12px;}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--ouro),var(--ouro-esc));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 16px rgba(201,160,61,0.25);}
    .logo-text h1{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;color:var(--ouro);letter-spacing:2px;}
    .logo-text p{font-size:0.6rem;color:var(--txt-fraco);letter-spacing:1px;text-transform:uppercase;}
    .relogio{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--ouro);letter-spacing:3px;}

    /* Comp strip */
    .comp-strip{background:var(--bg2);border:1px solid var(--borda);border-left:3px solid var(--ouro);border-radius:10px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .comp-nome-lbl{font-family:'Oswald',sans-serif;font-size:0.95rem;color:var(--ouro);letter-spacing:1px;}
    .update-dot{display:inline-block;width:6px;height:6px;background:var(--verde);border-radius:50%;margin-right:5px;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .comp-info-lbl{font-size:0.7rem;color:var(--txt-fraco);}

    /* Faixa tabs */
    .faixa-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
    .ftab{background:var(--bg2);border:1px solid var(--borda);color:var(--txt-fraco);padding:7px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
    .ftab:hover{border-color:var(--ouro-esc);color:var(--ouro);}
    .ftab.active{background:rgba(201,160,61,0.1);border-color:var(--ouro);color:var(--ouro);}

    /* Main confronto card */
    .match-card{background:var(--bg2);border:1px solid var(--borda);border-radius:16px;overflow:hidden;margin-bottom:20px;}
    .match-card-header{background:var(--bg3);padding:12px 20px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .match-rodada{font-family:'Oswald',sans-serif;font-size:0.82rem;color:var(--txt-fraco);letter-spacing:2px;text-transform:uppercase;}
    .match-faixa{font-family:'Oswald',sans-serif;font-size:0.82rem;color:var(--ouro);letter-spacing:1px;}
    .badge-ao-vivo{background:rgba(0,230,138,0.12);border:1px solid rgba(0,230,138,0.35);color:var(--verde);padding:4px 12px;border-radius:20px;font-size:0.65rem;font-weight:700;animation:blink 0.9s infinite;}

    .match-teams{display:grid;grid-template-columns:1fr 120px 1fr;align-items:center;gap:16px;padding:28px 24px;}
    .team-block{display:flex;flex-direction:column;}
    .team-block-right{text-align:right;}
    .team-name{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--txt);letter-spacing:1px;line-height:1.1;}
    .team-city{font-size:0.72rem;color:var(--txt-fraco);margin-top:4px;}
    .score-center{text-align:center;}
    .score-nums{font-family:'Oswald',sans-serif;font-size:4rem;font-weight:700;color:var(--ouro);line-height:1;letter-spacing:-2px;}
    .score-sep{font-size:2.5rem;color:var(--txt-fraco);}
    .score-sub{font-size:0.65rem;color:var(--txt-fraco);margin-top:4px;letter-spacing:1px;text-transform:uppercase;}

    /* Categories */
    .cats-header{padding:10px 20px;background:var(--bg3);border-top:1px solid var(--borda);display:grid;grid-template-columns:90px 1fr 90px 70px 1fr 90px;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-fraco);}
    .cat-row-tv{padding:11px 20px;border-top:1px solid rgba(255,255,255,0.03);display:grid;grid-template-columns:90px 1fr 90px 70px 1fr 90px;gap:6px;align-items:center;transition:background 0.3s;}
    .cat-row-tv.won-1{background:rgba(59,139,255,0.07);}
    .cat-row-tv.won-2{background:rgba(239,68,68,0.07);}
    .cat-row-tv.won-emp{background:rgba(245,158,11,0.05);}
    .cat-row-tv.pending{background:transparent;}
    .cat-name{font-family:'Oswald',sans-serif;font-size:0.85rem;color:var(--txt-fraco);letter-spacing:1px;}
    .cat-atleta{font-size:0.82rem;font-weight:600;}
    .cat-result{text-align:center;}
    .cat-badge{padding:3px 10px;border-radius:20px;font-size:0.62rem;font-weight:700;display:inline-block;white-space:nowrap;}
    .cb-1{background:rgba(59,139,255,0.15);color:var(--azul);border:1px solid rgba(59,139,255,0.3);}
    .cb-2{background:rgba(239,68,68,0.15);color:var(--vermelho);border:1px solid rgba(239,68,68,0.3);}
    .cb-emp{background:rgba(245,158,11,0.12);color:var(--laranja);border:1px solid rgba(245,158,11,0.3);}
    .cb-pend{background:rgba(255,255,255,0.04);color:var(--txt-fraco);border:1px solid rgba(255,255,255,0.07);}
    .trophy{font-size:0.85rem;margin-left:3px;}

    /* Standings mini */
    .standings-mini{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;margin-bottom:20px;}
    .standings-header{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--borda);font-family:'Oswald',sans-serif;font-size:0.75rem;font-weight:700;color:var(--txt-fraco);letter-spacing:2px;text-transform:uppercase;}
    .standings-row{display:grid;grid-template-columns:32px 1fr 30px 30px 30px 30px 50px;gap:6px;padding:9px 16px;border-top:1px solid rgba(255,255,255,0.03);align-items:center;font-size:0.8rem;}
    .standings-row:first-child{border-top:none;}
    .srank{font-family:'Oswald',sans-serif;font-size:0.85rem;color:var(--txt-fraco);}
    .snome{font-weight:600;}
    .spts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--ouro);font-size:0.9rem;}
    .snum{text-align:center;color:var(--txt-fraco);font-size:0.75rem;}
    .snum-v{color:var(--verde);}

    /* Empty */
    .empty{text-align:center;padding:70px 20px;color:var(--txt-fraco);}
    .empty .icon{font-size:2.8rem;margin-bottom:14px;opacity:0.45;}
    .empty h3{font-family:'Oswald',sans-serif;font-size:1.1rem;margin-bottom:7px;letter-spacing:1px;}

    .footer{text-align:center;margin-top:26px;font-size:0.62rem;color:var(--txt-fraco);letter-spacing:1px;text-transform:uppercase;}

    @media(max-width:700px){
      .match-teams{grid-template-columns:1fr 70px 1fr;padding:18px 14px;}
      .team-name{font-size:1.2rem;}
      .score-nums{font-size:2.6rem;}
      .cats-header,.cat-row-tv{grid-template-columns:70px 1fr 50px 1fr;gap:4px;}
      .cats-header span:nth-child(3),.cat-row-tv div:nth-child(3),
      .cats-header span:nth-child(5),.cat-row-tv div:nth-child(5){display:none;}
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">📺</div>
      <div class="logo-text">
        <h1>TV AO VIVO — LIGA BJJ</h1>
        <p id="comp-nome-sub">COMPETIÇÃO BJJ</p>
      </div>
    </div>
    <div class="relogio" id="relogio">--:--:--</div>
  </div>

  <div class="comp-strip">
    <span class="comp-nome-lbl" id="comp-nome">📡 Carregando...</span>
    <div class="comp-info-lbl">
      <span class="update-dot"></span>
      <span id="ultima-atualizacao">--</span>
    </div>
  </div>

  <!-- Faixa tabs -->
  <div class="faixa-tabs" id="faixa-tabs"></div>

  <!-- Confronto ao vivo -->
  <div id="main-content"></div>

  <div class="footer">Atualização automática a cada 3 segundos · Liga BJJ · COMPETIÇÃO BJJ</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const campeonatoId = params.get('id');
const LIGA_KEY = `gaditas_liga_${campeonatoId}`;
const FAIXAS_LABEL = { branca:'Branca', azul:'Azul', roxa:'Roxa', marrom:'Marrom', preta:'Preta' };
const FAIXAS_COR = { branca:'#6B7280', azul:'#3B8BFF', roxa:'#9B59B6', marrom:'#92400E', preta:'#1A1A1A' };
const CATS_DEFAULT = ['Pluma', 'Leve', 'Médio', 'Meio-Pesado', 'Pesado'];

let faixaAtiva = null;

// Relógio
function tick() {
  const d = new Date();
  document.getElementById('relogio').textContent =
    pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}
function pad(n) { return n.toString().padStart(2,'0'); }
setInterval(tick, 1000); tick();

// Render
function carregar() {
  const raw = localStorage.getItem(LIGA_KEY);
  document.getElementById('ultima-atualizacao').textContent = 'às '+pad(new Date().getHours())+':'+pad(new Date().getMinutes())+':'+pad(new Date().getSeconds());

  if (!raw) {
    document.getElementById('comp-nome').textContent = '⏸️ Nenhuma Liga ativa';
    document.getElementById('main-content').innerHTML = `<div class="empty"><div class="icon">📺</div><h3>Nenhuma Liga Ativa</h3><p>Acesse o painel admin e inicie um confronto ao vivo.</p></div>`;
    document.getElementById('faixa-tabs').innerHTML = '';
    return;
  }

  const estado = JSON.parse(raw);
  document.getElementById('comp-nome').textContent = '⚽ ' + (estado.nomeCompeticao || 'Liga BJJ');
  document.getElementById('comp-nome-sub').textContent = estado.nomeCompeticao || 'Liga BJJ';

  const cfg = estado.ligaConfig || {};
  const CATEGORIAS = [...(cfg.categorias || CATS_DEFAULT), ...(cfg.temAbsoluto ? ['Absoluto'] : [])];

  const equipes = estado.equipes || [];
  const confrontos = estado.confrontos || [];
  const atletas = estado.atletas || [];

  // Faixas disponíveis
  const faixasDisponiveis = [...new Set(confrontos.map(c => c.faixa))].filter(Boolean);
  if (!faixaAtiva || !faixasDisponiveis.includes(faixaAtiva)) {
    // Priorizar ao_vivo
    const aoVivo = confrontos.find(c => c.status === 'ao_vivo');
    faixaAtiva = aoVivo?.faixa || estado.faixaAtiva || faixasDisponiveis[0] || 'branca';
  }

  // Render faixa tabs
  document.getElementById('faixa-tabs').innerHTML = faixasDisponiveis.map(f => {
    const temAoVivo = confrontos.some(c => c.faixa === f && c.status === 'ao_vivo');
    return `<button class="ftab ${f === faixaAtiva ? 'active' : ''}" onclick="setFaixa('${f}')">
      ${temAoVivo ? '🔴 ' : ''}${FAIXAS_LABEL[f] || f}
    </button>`;
  }).join('');

  function nomeEq(id) { return equipes.find(e => e.id === id)?.nome || '?'; }

  // Confronto ao vivo para faixa ativa
  const aoVivo = confrontos.find(c => c.faixa === faixaAtiva && c.status === 'ao_vivo');
  let html = '';

  if (aoVivo) {
    const eq1 = nomeEq(aoVivo.equipe1Id), eq2 = nomeEq(aoVivo.equipe2Id);
    const r = aoVivo.resultado || {};
    const cats = r.categorias || CATEGORIAS.map(c => ({ categoria: c, vencedor: null, finalizacao: false }));
    const v1 = r.vitoriasEq1 || 0, v2 = r.vitoriasEq2 || 0;
    const pend = cats.filter(c => !c.vencedor).length;
    const fl = FAIXAS_LABEL[faixaAtiva] || faixaAtiva;
    const corFaixa = FAIXAS_COR[faixaAtiva] || '#C9A03D';

    html += `<div class="match-card">
      <div class="match-card-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="match-rodada">Rodada ${aoVivo.rodada} · ${aoVivo.leg === 'volta' ? '🔄 Volta' : '➡️ Ida'}</span>
          <span class="match-faixa" style="color:${corFaixa}">⬤ Faixa ${fl}</span>
        </div>
        <span class="badge-ao-vivo">🔴 AO VIVO</span>
      </div>
      <div class="match-teams">
        <div class="team-block">
          <div class="team-name">${eq1}</div>
          <div class="team-city">${equipes.find(e=>e.id===aoVivo.equipe1Id)?.cidade||'Casa'}</div>
        </div>
        <div class="score-center">
          <div class="score-nums">${v1}<span class="score-sep">×</span>${v2}</div>
          <div class="score-sub">${pend > 0 ? pend + ' pendente(s)' : '✅ Placar Final'}</div>
        </div>
        <div class="team-block team-block-right">
          <div class="team-name">${eq2}</div>
          <div class="team-city">${equipes.find(e=>e.id===aoVivo.equipe2Id)?.cidade||'Visitante'}</div>
        </div>
      </div>
      <div class="cats-header">
        <span>Categoria</span><span>Atleta Casa</span><span style="text-align:center">Placar</span><span style="text-align:center">Resultado</span><span>Atleta Visitante</span><span style="text-align:right">Status</span>
      </div>
      ${cats.map(cr => {
        const at1 = atletas.find(a => a.equipeId === aoVivo.equipe1Id && a.faixa === faixaAtiva && a.categoria === cr.categoria);
        const at2 = atletas.find(a => a.equipeId === aoVivo.equipe2Id && a.faixa === faixaAtiva && a.categoria === cr.categoria);
        let rowCls = 'pending', badge = '<span class="cat-badge cb-pend">⏳ Pendente</span>';
        let nome1Html = `<span class="cat-atleta">${at1?.nome || eq1.split(' ')[0]}</span>`;
        let nome2Html = `<span class="cat-atleta">${at2?.nome || eq2.split(' ')[0]}</span>`;
        let catScore = '<span style="color:var(--txt-fraco)">—</span>';

        if (cr.vencedor === '1') {
          rowCls = 'won-1'; badge = `<span class="cat-badge cb-1">${cr.finalizacao ? '🔒 Sub' : '🥇 Casa'}</span>`;
          nome1Html = `<strong class="cat-atleta" style="color:var(--azul)">${at1?.nome || eq1.split(' ')[0]} 🏆</strong>`;
          catScore = `<span style="color:var(--azul);font-weight:700">1 × 0</span>`;
        } else if (cr.vencedor === '2') {
          rowCls = 'won-2'; badge = `<span class="cat-badge cb-2">${cr.finalizacao ? '🔒 Sub' : '🥇 Visit.'}</span>`;
          nome2Html = `<strong class="cat-atleta" style="color:var(--vermelho)">${at2?.nome || eq2.split(' ')[0]} 🏆</strong>`;
          catScore = `<span style="color:var(--vermelho);font-weight:700">0 × 1</span>`;
        } else if (cr.vencedor === 'empate') {
          rowCls = 'won-emp'; badge = `<span class="cat-badge cb-emp">🤝 Empate</span>`;
          catScore = `<span style="color:var(--laranja);font-weight:700">½ × ½</span>`;
        }
        return `<div class="cat-row-tv ${rowCls}">
          <span class="cat-name">${cr.categoria}</span>
          <div>${nome1Html}</div>
          <div style="text-align:center">${catScore}</div>
          <div class="cat-result">${badge}</div>
          <div style="text-align:right">${nome2Html}</div>
          <div style="text-align:right"></div>
        </div>`;
      }).join('')}
    </div>`;
  } else {
    // Mostrar último resultado concluído desta faixa
    const ultimoConcluido = [...confrontos].filter(c => c.faixa === faixaAtiva && c.status === 'concluido')
      .sort((a,b) => b.rodada - a.rodada)[0];
    if (ultimoConcluido) {
      const eq1 = nomeEq(ultimoConcluido.equipe1Id), eq2 = nomeEq(ultimoConcluido.equipe2Id);
      const r = ultimoConcluido.resultado || {};
      html += `<div class="match-card" style="opacity:0.7">
        <div class="match-card-header">
          <span class="match-rodada">Último Resultado — Rodada ${ultimoConcluido.rodada}</span>
          <span style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:var(--txt-fraco);padding:4px 12px;border-radius:20px;font-size:0.65rem;font-weight:700;">✅ CONCLUÍDO</span>
        </div>
        <div class="match-teams">
          <div class="team-block"><div class="team-name">${eq1}</div></div>
          <div class="score-center">
            <div class="score-nums">${r.vitoriasEq1||0}<span class="score-sep">×</span>${r.vitoriasEq2||0}</div>
            <div class="score-sub">Resultado Final</div>
          </div>
          <div class="team-block team-block-right"><div class="team-name">${eq2}</div></div>
        </div>
      </div>`;
    }
    html += `<div class="empty"><div class="icon">⏸️</div><h3>Nenhum Confronto Ao Vivo</h3><p>Aguardando início do próximo confronto na faixa ${FAIXAS_LABEL[faixaAtiva]||faixaAtiva}.</p></div>`;
  }

  // Classificação mini
  const confsF = confrontos.filter(c => c.faixa === faixaAtiva);
  const eqIds = [...new Set(confsF.flatMap(c => [c.equipe1Id, c.equipe2Id]))];
  const eqsF = equipes.filter(e => eqIds.includes(e.id));
  if (eqsF.length) {
    const stats = {};
    eqsF.forEach(e => { stats[e.id] = { eq:e, j:0, v:0, emp:0, d:0, pts:0 }; });
    confsF.filter(c => c.status === 'concluido' && c.resultado).forEach(c => {
      const s1 = stats[c.equipe1Id], s2 = stats[c.equipe2Id];
      if (!s1 || !s2) return;
      const v1 = c.resultado.vitoriasEq1||0, v2 = c.resultado.vitoriasEq2||0;
      s1.j++; s2.j++;
      if (v1>v2){ s1.v++; s2.d++; s1.pts+=3; }
      else if(v2>v1){ s2.v++; s1.d++; s2.pts+=3; }
      else{ s1.emp++; s2.emp++; s1.pts+=1; s2.pts+=1; }
    });
    const ranked = Object.values(stats).sort((a,b)=>b.pts-a.pts||b.v-a.v);
    const medals = ['🥇','🥈','🥉'];
    html += `<div class="standings-mini">
      <div class="standings-header">📊 CLASSIFICAÇÃO — FAIXA ${(FAIXAS_LABEL[faixaAtiva]||faixaAtiva).toUpperCase()}</div>
      ${ranked.map((s,i) => {
        const logoHtml = s.eq.logoBase64
          ? `<img src="${s.eq.logoBase64}" style="width:22px;height:22px;object-fit:contain;border-radius:3px;flex-shrink:0;">`
          : `<span style="width:22px;height:22px;background:rgba(255,255,255,0.06);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;">🏅</span>`;
        return `<div class="standings-row">
          <span class="srank">${medals[i]||((i+1)+'º')}</span>
          <span class="snome" style="display:flex;align-items:center;gap:6px">${logoHtml}${s.eq.nome}</span>
          <span class="snum snum-v">${s.v}</span>
          <span class="snum">${s.emp}</span>
          <span class="snum" style="color:var(--vermelho)">${s.d}</span>
          <span class="snum">${s.j}</span>
          <span class="spts">${s.pts} pts</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

window.setFaixa = function(f) { faixaAtiva = f; carregar(); };

carregar();
setInterval(carregar, 3000);

window.addEventListener('storage', e => {
  if (e.key === LIGA_KEY) carregar();
});
</script>
</body>
</html>
