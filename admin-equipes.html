<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Equipes - GADITAS TORNEIOS</title>
  <style>
    :root {
      --bg: #0f1220; --card: #171b2e; --text: #f2f5ff; --muted: #aab3d1;
      --primary: #3b82f6; --success: #16a34a; --warning: #f59e0b; --danger: #dc2626; --border: #2b3358;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }
    .back { color: #9fc0ff; text-decoration: none; font-size: 14px; }
    .logo { text-align: center; margin: 10px 0 0; font-size: 36px; }
    h1 { text-align: center; margin: 6px 0 4px; font-size: 24px; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 16px; }
    .camp-nome { text-align:center; font-size:0.85rem; color:#C9A03D; margin-bottom:10px; font-weight:700; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    .card h2 { margin: 0 0 14px; font-size: 18px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
    .field input { width: 100%; border: 1px solid var(--border); background: #0f1430; color: var(--text); border-radius: 10px; padding: 11px 12px; font-size: 15px; outline:none; }
    .field input:focus { border-color: var(--primary); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-warning { background: var(--warning); color: #111827; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: #111935; color: var(--text); border: 1px solid var(--border); }
    .msg { margin-top: 10px; font-size: 13px; font-weight: 700; min-height: 18px; }
    .msg.ok { color: #86efac; } .msg.err { color: #fecaca; }
    .list { display: grid; gap: 10px; }
    .item { background: #111935; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .item .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .item .actions { display: flex; gap: 8px; }
    .empty { border: 1px dashed var(--border); border-radius: 12px; padding: 20px; color: var(--muted); text-align: center; }
    .loading { text-align:center; color:var(--muted); padding:20px; }
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script>verificarAuth();</script>

<div class="container">
  <a class="back" id="linkVoltar" href="index.html">← Voltar para Admin</a>
  <div class="logo">🏢</div>
  <h1>Administração de Equipes</h1>
  <div class="subtitle">Incluir, alterar e excluir equipes</div>
  <div class="camp-nome" id="camp-nome"></div>

  <section class="card">
    <h2 id="tituloForm">➕ Incluir equipe</h2>
    <form id="formEquipe">
      <input type="hidden" id="editId" />
      <div class="field">
        <label for="nomeEquipe">Nome da equipe</label>
        <input id="nomeEquipe" required placeholder="Ex: Alliance" />
      </div>
      <div class="field">
        <label for="professorResponsavel">Professor responsável</label>
        <input id="professorResponsavel" placeholder="Ex: João Silva" />
      </div>
      <div class="field">
        <label for="telefoneProfessor">Telefone do professor</label>
        <input id="telefoneProfessor" placeholder="(79) 99999-9999" />
      </div>
      <div class="row">
        <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar equipe</button>
        <button type="button" class="btn btn-ghost" id="btnCancelarEdicao" style="display:none;">Cancelar edição</button>
      </div>
      <div id="msg" class="msg"></div>
    </form>
  </section>

  <section class="card">
    <h2>📋 Equipes cadastradas</h2>
    <div id="lista" class="list"><div class="loading">Carregando...</div></div>
  </section>
</div>

<script type="module">
  import { listarEquipes, salvarEquipe, atualizarEquipe, deletarEquipe, buscarCampeonato, onLogin } from './js/firebase.js';

  const campeonatoId = new URLSearchParams(location.search).get('id');
  const $ = id => document.getElementById(id);

  if (!campeonatoId) {
    $('lista').innerHTML = '<div class="empty">⚠️ Campeonato não especificado.<br>Acesse via painel admin → Gerenciar.</div>';
    $('formEquipe').style.display = 'none';
  } else {
    $('linkVoltar').href = `index.html?id=${campeonatoId}`;
    buscarCampeonato(campeonatoId).then(c => {
      if (c) $('camp-nome').textContent = `🏆 ${c.nome}`;
    });
    // Aguarda Firebase Auth antes de carregar dados protegidos
    onLogin(user => {
      if (user) iniciar();
      else $('lista').innerHTML = '<div class="empty">Sessão expirada. <a href="login-admin.html">Login</a></div>';
    });
  }

  let equipesData = [];

  async function iniciar() {
    await carregar();
  }

  async function carregar() {
    try {
      equipesData = await listarEquipes(campeonatoId);
      render();
    } catch(e) {
      $('lista').innerHTML = `<div class="empty">Erro ao carregar: ${e.message}</div>`;
    }
  }

  function render() {
    const lista = $('lista');
    if (!equipesData.length) {
      lista.innerHTML = '<div class="empty">Nenhuma equipe cadastrada.</div>';
      return;
    }
    lista.innerHTML = equipesData.map(eq => `
      <div class="item">
        <div>
          <strong>${eq.nome}</strong>
          ${eq.professorResponsavel ? `<div class="meta">Professor: ${eq.professorResponsavel}</div>` : ''}
          ${eq.telefoneProfessor ? `<div class="meta">Telefone: ${eq.telefoneProfessor}</div>` : ''}
        </div>
        <div class="actions">
          <button class="btn btn-warning" data-edit="${eq.id}">Alterar</button>
          <button class="btn btn-danger" data-del="${eq.id}">Excluir</button>
        </div>
      </div>
    `).join('');
  }

  function resetForm() {
    $('editId').value = '';
    $('formEquipe').reset();
    $('tituloForm').textContent = '➕ Incluir equipe';
    $('btnSalvar').textContent = 'Salvar equipe';
    $('btnCancelarEdicao').style.display = 'none';
    $('nomeEquipe').focus();
  }

  function showMsg(text, type = '') {
    const m = $('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
  }

  function formatarTelefone(v) {
    const d = (v||'').replace(/\D/g,'').slice(0,11);
    if (d.length <= 10) return d.replace(/^(\d{0,2})(\d{0,4})(\d{0,4}).*$/, (_,a,b,c) => [a&&`(${a}`,a.length===2&&') ',b,b&&c&&'-',c].filter(Boolean).join(''));
    return d.replace(/^(\d{2})(\d{5})(\d{4}).*$/, '($1) $2-$3');
  }

  $('telefoneProfessor').addEventListener('input', () => {
    $('telefoneProfessor').value = formatarTelefone($('telefoneProfessor').value);
  });

  $('formEquipe').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!campeonatoId) return;

    const editId = $('editId').value;
    const nome = $('nomeEquipe').value.trim();
    if (!nome) { showMsg('Informe o nome da equipe.', 'err'); return; }

    const duplicada = equipesData.find(e => e.nome?.toLowerCase() === nome.toLowerCase() && e.id !== editId);
    if (duplicada) { showMsg('Já existe equipe com esse nome.', 'err'); return; }

    const dados = {
      nome,
      professorResponsavel: $('professorResponsavel').value.trim(),
      telefoneProfessor: $('telefoneProfessor').value.trim(),
    };

    const btn = $('btnSalvar');
    btn.textContent = 'Salvando...';
    btn.disabled = true;
    try {
      if (editId) {
        await atualizarEquipe(campeonatoId, editId, dados);
        showMsg('Equipe alterada com sucesso.', 'ok');
      } else {
        await salvarEquipe(campeonatoId, dados);
        showMsg('Equipe incluída com sucesso.', 'ok');
      }
      await carregar();
      resetForm();
    } catch(err) {
      showMsg('Erro ao salvar: ' + err.message, 'err');
    } finally {
      btn.textContent = editId ? 'Salvar alterações' : 'Salvar equipe';
      btn.disabled = false;
    }
  });

  $('btnCancelarEdicao').addEventListener('click', () => {
    resetForm();
    showMsg('', '');
  });

  $('lista').addEventListener('click', async (e) => {
    const idEdit = e.target.getAttribute('data-edit');
    const idDel  = e.target.getAttribute('data-del');

    if (idEdit) {
      const eq = equipesData.find(x => x.id === idEdit);
      if (!eq) return;
      $('editId').value = eq.id;
      $('nomeEquipe').value = eq.nome || '';
      $('professorResponsavel').value = eq.professorResponsavel || '';
      $('telefoneProfessor').value = eq.telefoneProfessor || '';
      $('tituloForm').textContent = '✏️ Alterar equipe';
      $('btnSalvar').textContent = 'Salvar alterações';
      $('btnCancelarEdicao').style.display = 'inline-block';
      showMsg('Editando equipe selecionada.', 'ok');
      $('nomeEquipe').focus();
    }

    if (idDel) {
      const eq = equipesData.find(x => x.id === idDel);
      if (!eq) return;
      if (!confirm(`Excluir a equipe "${eq.nome}"?`)) return;
      try {
        await deletarEquipe(campeonatoId, idDel);
        showMsg('Equipe excluída.', 'ok');
        if ($('editId').value === idDel) resetForm();
        await carregar();
      } catch(err) {
        showMsg('Erro ao excluir: ' + err.message, 'err');
      }
    }
  });
</script>
</body>
</html>
