<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrições - Gaditas Torneios</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:#F5F7FA; color:#1A2C3E; }
    .app { max-width:1100px; margin:0 auto; padding:24px 20px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #E2E8F0; flex-wrap:wrap; gap:12px; }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo h1 { font-size:1.1rem; font-weight:700; }
    .logo p { font-size:0.7rem; color:#8A9CB0; }
    .btn { border:none; padding:8px 18px; border-radius:40px; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-back { background:transparent; border:1px solid #E2E8F0; color:#1A2C3E; }
    .btn-back:hover { border-color:#C9A03D; }

    .filtros { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .filtro { background:#fff; border:1px solid #E2E8F0; padding:7px 16px; border-radius:40px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
    .filtro.active { background:#C9A03D; color:#fff; border-color:#C9A03D; }

    .contador { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .badge-count { padding:6px 14px; border-radius:40px; font-size:0.78rem; font-weight:600; }
    .badge-pendente { background:#FEF9C3; color:#92400E; }
    .badge-aprovado { background:#DCFCE7; color:#166534; }
    .badge-rejeitado { background:#FEE2E2; color:#991B1B; }

    .lista { display:flex; flex-direction:column; gap:14px; }
    .card { background:#fff; border:1px solid #E2E8F0; border-radius:14px; overflow:hidden; }
    .card-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #E2E8F0; background:#FAFBFC; flex-wrap:wrap; gap:8px; }
    .atleta-nome { font-weight:700; font-size:0.95rem; }
    .status-badge { padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; }
    .status-pendente { background:#FEF9C3; color:#92400E; }
    .status-aprovado { background:#DCFCE7; color:#166534; }
    .status-rejeitado { background:#FEE2E2; color:#991B1B; }

    .card-body { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px 18px; }
    @media(max-width:600px){ .card-body { grid-template-columns:1fr; } }

    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .info-item label { font-size:0.68rem; color:#8A9CB0; text-transform:uppercase; font-weight:600; display:block; margin-bottom:2px; }
    .info-item span { font-size:0.85rem; font-weight:500; }

    .comprovante-box { display:flex; flex-direction:column; gap:8px; }
    .comprovante-box label { font-size:0.68rem; color:#8A9CB0; text-transform:uppercase; font-weight:600; }
    .comprovante-box img { width:100%; max-height:220px; object-fit:contain; border:1px solid #E2E8F0; border-radius:8px; background:#F5F7FA; cursor:zoom-in; }
    .sem-comprovante { background:#F5F7FA; border:1px solid #E2E8F0; border-radius:8px; padding:20px; text-align:center; font-size:0.78rem; color:#8A9CB0; }

    .card-footer { display:flex; gap:8px; padding:12px 18px; border-top:1px solid #E2E8F0; justify-content:flex-end; flex-wrap:wrap; }
    .btn-aprovar { background:#16a34a; color:#fff; }
    .btn-aprovar:hover { background:#15803d; }
    .btn-rejeitar { background:transparent; border:1px solid #EF4444; color:#EF4444; }
    .btn-rejeitar:hover { background:#EF4444; color:#fff; }

    .vazio { text-align:center; padding:60px 20px; color:#8A9CB0; }
    .vazio span { font-size:3rem; display:block; margin-bottom:12px; opacity:0.4; }

    /* Lightbox */
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; }
    .lightbox-close { position:fixed; top:16px; right:20px; color:#fff; font-size:2rem; cursor:pointer; }
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script>verificarAuth();</script>

<div class="app">
  <div class="top-bar">
    <div class="logo">
      <span style="font-size:1.8rem">📋</span>
      <div>
        <h1>Inscrições</h1>
        <p>Aprovação de atletas</p>
      </div>
    </div>
    <a href="index.html" class="btn btn-back">← Voltar</a>
  </div>

  <div class="contador">
    <span class="badge-count badge-pendente" id="cnt-pendente">0 pendentes</span>
    <span class="badge-count badge-aprovado" id="cnt-aprovado">0 aprovados</span>
    <span class="badge-count badge-rejeitado" id="cnt-rejeitado">0 rejeitados</span>
  </div>

  <div class="filtros">
    <button class="filtro active" onclick="filtrar('pendente', this)">⏳ Pendentes</button>
    <button class="filtro" onclick="filtrar('aprovado', this)">✅ Aprovados</button>
    <button class="filtro" onclick="filtrar('rejeitado', this)">❌ Rejeitados</button>
    <button class="filtro" onclick="filtrar('todos', this)">📋 Todos</button>
  </div>

  <div class="lista" id="lista"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightbox-img" src="">
</div>

<script type="module">
  import { listarInscricoes, atualizarInscricao, salvarAtleta, buscarCampeonato } from './js/firebase.js';

  const campeonatoId = new URLSearchParams(location.search).get('id');
  if (!campeonatoId) {
    document.getElementById('lista').innerHTML = '<div style="padding:40px;text-align:center;color:red">Campeonato não especificado. Acesse pelo painel admin.</div>';
  } else {
    buscarCampeonato(campeonatoId).then(c => {
      if (c) document.title = `Inscrições — ${c.nome}`;
    });
  }

  let todasInscricoes = [];
  let filtroAtual = 'pendente';

  function atualizarContadores() {
    document.getElementById('cnt-pendente').textContent = todasInscricoes.filter(i => i.status === 'pendente').length + ' pendentes';
    document.getElementById('cnt-aprovado').textContent = todasInscricoes.filter(i => i.status === 'aprovado').length + ' aprovados';
    document.getElementById('cnt-rejeitado').textContent = todasInscricoes.filter(i => i.status === 'rejeitado').length + ' rejeitados';
  }

  window.filtrar = function(status, el) {
    filtroAtual = status;
    document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderizar();
  };

  function renderizar() {
    const lista = document.getElementById('lista');
    const visiveis = filtroAtual === 'todos' ? todasInscricoes : todasInscricoes.filter(i => i.status === filtroAtual);
    atualizarContadores();

    if (!visiveis.length) {
      lista.innerHTML = `<div class="vazio"><span>📭</span>Nenhuma inscrição ${filtroAtual === 'todos' ? '' : filtroAtual}.</div>`;
      return;
    }

    lista.innerHTML = visiveis.slice().reverse().map(i => `
      <div class="card" id="card-${i.id}">
        <div class="card-header">
          <div>
            <div class="atleta-nome">${i.nome}</div>
            <div style="font-size:0.72rem;color:#8A9CB0;margin-top:2px">${new Date(i.criadoEm).toLocaleString('pt-BR')}</div>
          </div>
          <span class="status-badge status-${i.status}">${i.status.toUpperCase()}</span>
        </div>
        <div class="card-body">
          <div class="info-grid">
            <div class="info-item"><label>Categoria</label><span>${i.categoria || '—'}</span></div>
            <div class="info-item"><label>Faixa</label><span>${i.faixa || '—'}</span></div>
            <div class="info-item"><label>Peso</label><span>${i.peso ? i.peso + ' kg' : '—'}</span></div>
            <div class="info-item"><label>Sexo</label><span>${i.sexo || '—'}</span></div>
            <div class="info-item"><label>Equipe</label><span>${i.equipeNome || i.equipe || '—'}</span></div>
            <div class="info-item"><label>Pagamento</label><span>${i.pagamento || '—'}</span></div>
            <div class="info-item"><label>Telefone</label><span>${i.telefone || '—'}</span></div>
            <div class="info-item"><label>E-mail</label><span style="font-size:0.78rem">${i.email || '—'}</span></div>
          </div>
          <div class="comprovante-box">
            <label>Comprovante de pagamento</label>
            ${i.comprovante
              ? `<img src="${i.comprovante}" alt="Comprovante" onclick="abrirLightbox('${i.id}')">`
              : `<div class="sem-comprovante">📎 Sem comprovante anexado</div>`}
          </div>
        </div>
        ${i.status === 'pendente' ? `
        <div class="card-footer">
          <button class="btn btn-rejeitar" onclick="rejeitar('${i.id}')">❌ Rejeitar</button>
          <button class="btn btn-aprovar" onclick="aprovar('${i.id}')">✅ Aprovar</button>
        </div>` : ''}
      </div>
    `).join('');
  }

  window.aprovar = async function(id) {
    if (!campeonatoId) return;
    const i = todasInscricoes.find(x => x.id === id);
    if (!i) return;
    try {
      await atualizarInscricao(campeonatoId, id, { status: 'aprovado' });
      await salvarAtleta(campeonatoId, {
        nome: i.nome,
        sexo: i.sexo,
        faixa: i.faixa,
        peso: i.peso,
        academia: i.equipeNome || i.equipe || '',
        dataNascimento: i.dataNascimento || '',
        dataCadastro: new Date().toISOString(),
        foto: i.foto || null,
        origem: 'inscricao'
      });
      i.status = 'aprovado';
      renderizar();
    } catch(e) {
      alert('Erro ao aprovar: ' + e.message);
    }
  };

  window.rejeitar = async function(id) {
    if (!confirm('Rejeitar esta inscrição?')) return;
    if (!campeonatoId) return;
    try {
      await atualizarInscricao(campeonatoId, id, { status: 'rejeitado' });
      const i = todasInscricoes.find(x => x.id === id);
      if (i) i.status = 'rejeitado';
      renderizar();
    } catch(e) {
      alert('Erro ao rejeitar: ' + e.message);
    }
  };

  window.abrirLightbox = function(id) {
    const i = todasInscricoes.find(x => x.id === id);
    if (!i?.comprovante) return;
    document.getElementById('lightbox-img').src = i.comprovante;
    document.getElementById('lightbox').classList.add('open');
  };

  window.fecharLightbox = function() {
    document.getElementById('lightbox').classList.remove('open');
  };

  async function iniciar() {
    if (!campeonatoId) return;
    document.getElementById('lista').innerHTML = '<div style="padding:40px;text-align:center;color:#8A9CB0">Carregando inscrições...</div>';
    try {
      todasInscricoes = await listarInscricoes(campeonatoId);
      renderizar();
    } catch(e) {
      document.getElementById('lista').innerHTML = `<div style="padding:40px;text-align:center;color:red">Erro ao carregar: ${e.message}</div>`;
    }
  }

  iniciar();
</script>
</body>
</html>
