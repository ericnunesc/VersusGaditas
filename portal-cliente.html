<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/logo-budoflow.png">
  <link rel="apple-touch-icon" href="images/logo-budoflow.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Cliente — COMPETIÇÃO BJJ</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:#F5F7FA; color:#1A2C3E; min-height:100vh; }

    header {
      background:#1A2C3E; color:#fff; padding:16px 28px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    }
    .header-logo { display:flex; align-items:center; gap:10px; }
    .header-logo h1 { font-size:1rem; font-weight:700; }
    .header-logo p  { font-size:0.68rem; color:#8A9CB0; }
    .header-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .header-cliente { font-size:0.82rem; color:#CBD5E1; }
    .btn-sair { background:transparent; border:1px solid #EF4444; color:#EF4444;
                padding:6px 14px; border-radius:40px; font-size:0.78rem; cursor:pointer; }
    .btn-sair:hover { background:#EF4444; color:#fff; }

    .app { max-width:1100px; margin:0 auto; padding:28px 20px; }

    /* Plano info */
    .plano-bar {
      background:#fff; border:1px solid #E2E8F0; border-radius:14px;
      padding:18px 22px; margin-bottom:28px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    }
    .plano-bar-left { display:flex; align-items:center; gap:14px; }
    .plano-icon { font-size:2rem; }
    .plano-nome { font-size:1rem; font-weight:700; }
    .plano-detalhe { font-size:0.75rem; color:#8A9CB0; margin-top:2px; }
    .status-pill { padding:5px 14px; border-radius:20px; font-size:0.75rem; font-weight:700; }
    .status-ativo    { background:#DCFCE7; color:#166534; }
    .status-pendente { background:#FEF9C3; color:#92400E; }
    .status-inativo  { background:#F1F5F9; color:#64748B; }

    /* Grid */
    .titulo-secao { font-size:0.72rem; font-weight:700; color:#8A9CB0;
                    text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

    .card {
      background:#fff; border:1px solid #E2E8F0; border-radius:16px;
      overflow:hidden; transition:box-shadow 0.2s;
    }
    .card:hover { box-shadow:0 6px 20px rgba(0,0,0,0.07); border-color:#C9A03D; }
    .card-banner {
      height:120px; display:flex; align-items:center; justify-content:center;
      font-size:2.8rem; background:linear-gradient(135deg,#1A2C3E,#2A4060);
      overflow:hidden; position:relative;
    }
    .card-banner img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .card-banner .emoji-sobre { position:relative; z-index:1; }
    .card-body { padding:14px 16px; }
    .card-nome { font-weight:700; font-size:0.95rem; margin-bottom:4px; }
    .card-info { font-size:0.74rem; color:#8A9CB0; margin-bottom:12px; display:flex; flex-direction:column; gap:2px; }
    .card-status { display:inline-block; padding:3px 9px; border-radius:20px; font-size:0.66rem; font-weight:700; margin-bottom:10px; }
    .cs-ativo    { background:#DCFCE7; color:#166534; }
    .cs-encerrado{ background:#F1F5F9; color:#64748B; }
    .cs-breve    { background:#FEF9C3; color:#92400E; }

    .card-acoes { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
    .btn-acao {
      display:block; text-align:center; padding:8px 6px;
      border:1px solid #E2E8F0; border-radius:8px; font-size:0.75rem;
      font-weight:600; color:#1A2C3E; text-decoration:none; background:#fff; transition:all 0.2s;
    }
    .btn-acao:hover { border-color:#C9A03D; color:#C9A03D; background:#FFFDF5; }
    .btn-acao.primary { background:#C9A03D; color:#fff; border-color:#C9A03D; }
    .btn-acao.primary:hover { background:#A0822E; }
    .btn-acao.full { grid-column:1/-1; }

    .vazio { text-align:center; padding:60px 20px; color:#8A9CB0; }
    .vazio span { font-size:3rem; display:block; margin-bottom:12px; opacity:0.3; }
    .loading { text-align:center; padding:60px; color:#8A9CB0; }

    .erro-acesso {
      background:#FEF2F2; border:1px solid #FECACA; border-radius:14px;
      padding:28px; text-align:center; color:#B91C1C;
    }
    .erro-acesso h3 { margin-bottom:8px; }
    .erro-acesso p { font-size:0.85rem; }

    @media(max-width:600px) { .card-acoes { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="images/logo-budoflow.png" alt="BudoFlow" style="height:38px;width:auto;border-radius:50%;flex-shrink:0;">
    <div>
      <h1>COMPETIÇÃO BJJ</h1>
      <p>Portal do Cliente</p>
    </div>
  </div>
  <div class="header-right">
    <span class="header-cliente" id="header-cliente"></span>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </div>
</header>

<div class="app">
  <div id="plano-bar" class="plano-bar" style="display:none"></div>
  <div class="titulo-secao">Suas Competições</div>
  <div id="grid" class="grid"><div class="loading">Carregando...</div></div>
</div>

<script type="module">
  import { onLogin, logout } from './js/firebase.js';
  import {
    getFirestore, collection, query, where, getDocs, orderBy
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

  const db = getFirestore(getApp());

  const LABEL_TIPO = { chaveamento:'🥋 Chaveamento', ligaAcademia:'🏫 Liga Academia — Interno', ligaInter:'⚔️ Liga Inter-Academias' };
  const LABEL_TIER = { starter:'Starter', pro:'Pro', elite:'Elite' };

  document.getElementById('btn-sair').addEventListener('click', async () => {
    await logout();
    window.location.replace('login-cliente.html');
  });

  onLogin(async user => {
    if (!user) { window.location.replace('login-cliente.html'); return; }

    // Permite acesso às páginas admin que usam verificarAuth() (localStorage legacy)
    localStorage.setItem('gaditas_logado', '1');

    try {
      // ── Busca cliente pelo UID ──────────────────────────────
      const cliSnap = await getDocs(
        query(collection(db, 'clientes'), where('uid', '==', user.uid))
      );

      if (cliSnap.empty) {
        document.getElementById('grid').innerHTML = `
          <div class="erro-acesso">
            <h3>⚠️ Acesso não configurado</h3>
            <p>Sua conta ainda não está vinculada a um cliente.<br>
               Entre em contato com o administrador da COMPETIÇÃO BJJ.</p>
          </div>`;
        document.getElementById('header-cliente').textContent = user.email;
        return;
      }

      const cliente = { id: cliSnap.docs[0].id, ...cliSnap.docs[0].data() };
      document.getElementById('header-cliente').textContent = cliente.nome;

      // ── Mostra info do plano ──────────────────────────────
      const statusLabel = { ativo:'✅ Ativo', pendente:'⏳ Pendente', inativo:'🔴 Inativo' }[cliente.status] || cliente.status;
      const statusClass = { ativo:'status-ativo', pendente:'status-pendente', inativo:'status-inativo' }[cliente.status] || '';
      const planoBar = document.getElementById('plano-bar');
      planoBar.style.display = 'flex';
      planoBar.innerHTML = `
        <div class="plano-bar-left">
          <div class="plano-icon">${cliente.tipo === 'ligaAcademia' ? '🏫' : cliente.tipo === 'ligaInter' ? '⚔️' : '🥋'}</div>
          <div>
            <div class="plano-nome">${cliente.nome}</div>
            <div class="plano-detalhe">${LABEL_TIPO[cliente.tipo]||cliente.tipo}${cliente.tier ? ' · '+LABEL_TIER[cliente.tier] : ''}${cliente.email ? ' · '+cliente.email : ''}</div>
          </div>
        </div>
        <span class="status-pill ${statusClass}">${statusLabel}</span>`;

      // ── Busca competições do cliente ──────────────────────
      const campsSnap = await getDocs(
        query(collection(db, 'campeonatos'),
              where('clienteId', '==', cliente.id))
      );
      const camps = campsSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.criadoEm?.seconds || 0) - (a.criadoEm?.seconds || 0));

      renderGrid(camps);

    } catch(e) {
      console.error(e);
      document.getElementById('grid').innerHTML =
        `<div class="vazio"><span>⚠️</span>Erro ao carregar. Verifique sua conexão.</div>`;
    }
  });

  function renderGrid(camps) {
    const grid = document.getElementById('grid');
    if (!camps.length) {
      grid.innerHTML = `<div class="vazio"><img src="images/logo-budoflow.png" alt="BudoFlow" style="height:68px;width:auto;border-radius:50%;display:block;margin:0 auto;">Nenhuma competição encontrada.<br><small>O administrador irá criar e vincular suas competições em breve.</small></div>`;
      return;
    }

    grid.innerHTML = camps.map(c => {
      const data       = c.data ? new Date(c.data+'T12:00').toLocaleDateString('pt-BR') : '—';
      const isLiga     = c.tipo === 'liga';
      const statusLbl  = { ativo:'✅ Inscrições abertas', breve:'🕐 Em breve', encerrado:'🔒 Encerrado' }[c.status] || c.status;
      const statusCls  = { ativo:'cs-ativo', breve:'cs-breve', encerrado:'cs-encerrado' }[c.status] || '';

      const acoes = isLiga ? `
        <a href="liga-adm.html?id=${c.id}" class="btn-acao primary full">⚽ Gerenciar Liga</a>
        <a href="liga-placar-adm.html?id=${c.id}" class="btn-acao" style="background:#10B981;color:#fff;border-color:#10B981">🎙️ Placar</a>
        <a href="liga-cronograma.html?id=${c.id}" class="btn-acao">📅 Cronograma</a>
        <a href="liga-placar-publico.html?id=${c.id}" class="btn-acao" target="_blank">🏆 Placar Público</a>
        <a href="liga-tv.html?id=${c.id}" class="btn-acao" target="_blank">📺 TV</a>
      ` : `
        <a href="painel.html?id=${c.id}" class="btn-acao primary full">⚙️ Gerenciar</a>
        <a href="adm-inscricoes.html?id=${c.id}" class="btn-acao">📋 Inscrições</a>
        <a href="adm-chaveamento.html?id=${c.id}" class="btn-acao">🥊 Chaveamento</a>
        <a href="placar-adm.html?id=${c.id}" class="btn-acao">🎙️ Placar</a>
        <a href="atletas-publico.html?id=${c.id}" class="btn-acao" target="_blank">👥 Atletas</a>
        <a href="cronograma-lutas.html?id=${c.id}" class="btn-acao" target="_blank">📅 Cronograma</a>
      `;

      const banner = c.cartaz
        ? `<div class="card-banner"><img src="${c.cartaz}" alt="Cartaz"></div>`
        : `<div class="card-banner"><span class="emoji-sobre">${c.emoji||'🥋'}</span></div>`;

      return `
        <div class="card">
          ${banner}
          <div class="card-body">
            <span class="card-status ${statusCls}">${statusLbl}</span>
            <div class="card-nome">${c.nome}</div>
            <div class="card-info">
              <span>📅 ${data}</span>
              ${c.local ? `<span>📍 ${c.local}</span>` : ''}
            </div>
            <div class="card-acoes">${acoes}</div>
          </div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
