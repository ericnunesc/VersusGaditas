<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/logo_favicon.png">
  <link rel="apple-touch-icon" href="images/logo_favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário — Liga BJJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ouro:#C9A03D;--ouro-esc:#A0822E;
      --bg:#060608;--bg2:#0E0E12;--bg3:#161620;--borda:#1E1E2A;
      --txt:#E8E8F0;--txt-fraco:#5A5A7A;
      --verde:#00E68A;--azul:#3B8BFF;--vermelho:#FF4444;--laranja:#F59E0B;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(201,160,61,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 16px 50px;}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 13px;border-bottom:1px solid var(--borda);margin-bottom:16px;flex-wrap:wrap;gap:10px;}
    .hdr-l{display:flex;align-items:center;gap:12px;}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--ouro),var(--ouro-esc));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 16px rgba(201,160,61,0.25);}
    .logo-t h1{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;color:var(--ouro);letter-spacing:2px;}
    .logo-t p{font-size:0.6rem;color:var(--txt-fraco);letter-spacing:1px;text-transform:uppercase;}
    .relogio{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--ouro);letter-spacing:3px;}

    /* Comp strip */
    .comp-strip{background:var(--bg2);border:1px solid var(--borda);border-left:3px solid var(--ouro);border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .comp-nome-lbl{font-family:'Oswald',sans-serif;font-size:0.95rem;color:var(--ouro);letter-spacing:1px;}
    .upd-dot{display:inline-block;width:6px;height:6px;background:var(--verde);border-radius:50%;margin-right:5px;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .comp-info-lbl{font-size:0.7rem;color:var(--txt-fraco);}

    /* Faixa tabs */
    .ftabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
    .ftab{background:var(--bg2);border:1px solid var(--borda);color:var(--txt-fraco);padding:8px 15px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
    .ftab:hover{border-color:var(--ouro-esc);color:var(--ouro);}
    .ftab.active{background:rgba(201,160,61,0.1);border-color:var(--ouro);color:var(--ouro);}
    .ftab .cnt{display:inline-block;background:rgba(201,160,61,0.15);color:var(--ouro);font-size:0.6rem;padding:1px 6px;border-radius:10px;margin-left:4px;}
    .ftab.tem-live{border-color:var(--verde);color:var(--verde);}

    /* Rodada section */
    .rodada-section{margin-bottom:16px;}
    .rodada-header{background:var(--bg3);border:1px solid var(--borda);border-radius:10px 10px 0 0;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
    .rodada-title{font-family:'Oswald',sans-serif;font-size:0.9rem;font-weight:700;color:var(--txt);letter-spacing:1px;}
    .rodada-leg{font-size:0.68rem;color:var(--txt-fraco);}
    .rodada-prog{font-size:0.68rem;color:var(--txt-fraco);}

    /* Confronto row */
    .conf-row{background:var(--bg2);border:1px solid var(--borda);border-top:none;padding:14px 18px;display:grid;grid-template-columns:1fr 80px 1fr auto;align-items:center;gap:12px;transition:background 0.2s;}
    .conf-row:last-child{border-radius:0 0 10px 10px;}
    .conf-row:hover{background:#0A0A0E;}
    .conf-row.ao-vivo{background:rgba(0,230,138,0.05);border-left:3px solid var(--verde);}
    .conf-row.concluido{opacity:0.55;}
    .conf-eq{font-weight:600;font-size:0.9rem;}
    .conf-sub{font-size:0.67rem;color:var(--txt-fraco);margin-top:2px;}
    .conf-score{text-align:center;font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;color:var(--ouro);}
    .conf-score-pend{color:var(--txt-fraco);}
    .conf-eq-r{text-align:right;}
    .conf-info{text-align:right;}
    .conf-meta{font-size:0.7rem;color:var(--txt-fraco);text-align:right;display:flex;flex-direction:column;gap:2px;}

    /* Badges */
    .badge{padding:3px 9px;border-radius:20px;font-size:0.6rem;font-weight:700;display:inline-block;white-space:nowrap;}
    .b-pend{background:rgba(245,158,11,0.1);color:var(--laranja);border:1px solid rgba(245,158,11,0.2);}
    .b-live{background:rgba(0,230,138,0.12);color:var(--verde);border:1px solid rgba(0,230,138,0.3);animation:blink 0.9s infinite;}
    .b-done{background:rgba(255,255,255,0.04);color:var(--txt-fraco);border:1px solid rgba(255,255,255,0.07);}

    /* Cat mini results */
    .cat-results{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
    .cr{padding:2px 7px;border-radius:5px;font-size:0.58rem;font-weight:600;}
    .cr-1{background:rgba(59,139,255,0.12);color:var(--azul);}
    .cr-2{background:rgba(239,68,68,0.12);color:var(--vermelho);}
    .cr-emp{background:rgba(245,158,11,0.1);color:var(--laranja);}
    .cr-pend{background:rgba(255,255,255,0.04);color:var(--txt-fraco);}

    /* Standings quick */
    .table-card{background:var(--bg2);border:1px solid var(--borda);border-radius:10px;overflow:hidden;margin-bottom:14px;}
    .table-card-header{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--borda);font-family:'Oswald',sans-serif;font-size:0.75rem;font-weight:700;color:var(--txt-fraco);letter-spacing:2px;text-transform:uppercase;}
    .trow{display:grid;grid-template-columns:32px 1fr 28px 28px 28px 28px 50px;gap:5px;padding:8px 16px;border-top:1px solid rgba(255,255,255,0.03);font-size:0.8rem;align-items:center;}
    .trow.th{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:1px;color:var(--txt-fraco);text-transform:uppercase;background:var(--bg3);border-top:none;}
    .tr-pos{font-family:'Oswald',sans-serif;color:var(--txt-fraco);}
    .tr-nome{font-weight:600;}
    .tr-n{text-align:center;color:var(--txt-fraco);}
    .tr-v{color:var(--verde);}
    .tr-d{color:var(--vermelho);}
    .tr-pts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--ouro);}
    .tr-gold{background:rgba(201,160,61,0.06);}
    .tr-silver{background:rgba(201,160,61,0.02);}

    /* Empty */
    .empty{text-align:center;padding:70px 20px;color:var(--txt-fraco);}
    .empty .icon{font-size:2.8rem;margin-bottom:14px;opacity:0.45;}
    .empty h3{font-family:'Oswald',sans-serif;font-size:1.1rem;margin-bottom:7px;letter-spacing:1px;}

    .footer{text-align:center;margin-top:24px;font-size:0.6rem;color:var(--txt-fraco);letter-spacing:1px;text-transform:uppercase;}

    @media(max-width:600px){
      .conf-row{grid-template-columns:1fr 60px 1fr;gap:8px;}
      .conf-meta{display:none;}
      .conf-row.ao-vivo .conf-meta{display:flex;}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="hdr-l">
      <div class="logo-icon">📅</div>
      <div class="logo-t">
        <h1>Calendário Liga BJJ</h1>
        <p id="comp-sub">COMPETIÇÃO BJJ</p>
      </div>
    </div>
    <div class="relogio" id="relogio">--:--:--</div>
  </div>

  <div class="comp-strip">
    <span class="comp-nome-lbl" id="comp-nome">Carregando...</span>
    <div class="comp-info-lbl">
      <span class="upd-dot"></span>
      <span id="upd-time">--</span>
    </div>
  </div>

  <div class="ftabs" id="ftabs"></div>
  <div id="main"></div>

  <div class="footer">Atualização automática a cada 5 segundos · Liga BJJ · COMPETIÇÃO BJJ</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cid = params.get('id');
const KEY = `gaditas_liga_${cid}`;
const FL = { branca:'Branca', azul:'Azul', roxa:'Roxa', marrom:'Marrom', preta:'Preta' };
const CATS_DEFAULT = ['Pluma', 'Pena', 'Leve', 'Médio', 'Meio-Pesado', 'Pesado'];

let faixaAtiva = null;

function pad(n){ return n.toString().padStart(2,'0'); }
function tick(){ const d=new Date(); document.getElementById('relogio').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
setInterval(tick,1000); tick();

function render() {
  document.getElementById('upd-time').textContent='às '+pad(new Date().getHours())+':'+pad(new Date().getMinutes())+':'+pad(new Date().getSeconds());
  const raw = localStorage.getItem(KEY);

  if (!raw) {
    document.getElementById('comp-nome').textContent='⏸️ Nenhuma Liga ativa';
    document.getElementById('ftabs').innerHTML='';
    document.getElementById('main').innerHTML=`<div class="empty"><div class="icon">📅</div><h3>Nenhum Calendário</h3><p>O administrador ainda não gerou o calendário desta Liga.</p></div>`;
    return;
  }

  const est = JSON.parse(raw);
  const cfg = est.ligaConfig || {};
  const CATS = [...(cfg.categorias || CATS_DEFAULT), ...(cfg.temAbsoluto ? ['Absoluto'] : [])];
  const equipes=est.equipes||[], confrontos=est.confrontos||[], atletas=est.atletas||[];
  document.getElementById('comp-nome').textContent='⚽ '+(est.nomeCompeticao||'Liga BJJ');
  document.getElementById('comp-sub').textContent=est.nomeCompeticao||'Liga BJJ';

  const faixas=[...new Set(confrontos.map(c=>c.faixa))].filter(Boolean);
  if (!faixaAtiva||!faixas.includes(faixaAtiva)) {
    const av=confrontos.find(c=>c.status==='ao_vivo');
    faixaAtiva=av?.faixa||est.faixaAtiva||faixas[0]||'branca';
  }

  function nEq(id){ return equipes.find(e=>e.id===id)?.nome||'?'; }

  // Faixa tabs
  document.getElementById('ftabs').innerHTML=faixas.map(f=>{
    const fConfs=confrontos.filter(c=>c.faixa===f);
    const total=fConfs.length;
    const done=fConfs.filter(c=>c.status==='concluido').length;
    const live=fConfs.some(c=>c.status==='ao_vivo');
    return `<button class="ftab ${f===faixaAtiva?'active':''} ${live?'tem-live':''}" onclick="setFaixa('${f}')">
      ${live?'🔴 ':''}${FL[f]||f}<span class="cnt">${done}/${total}</span>
    </button>`;
  }).join('');

  const confsF=confrontos.filter(c=>c.faixa===faixaAtiva).sort((a,b)=>a.rodada-b.rodada);

  if (!confsF.length) {
    document.getElementById('main').innerHTML=`<div class="empty"><div class="icon">📅</div><h3>Sem Jogos Agendados</h3><p>Nenhum jogo gerado para a faixa ${FL[faixaAtiva]||faixaAtiva}.</p></div>`;
    return;
  }

  // Agrupar por rodada
  const byRound={};
  confsF.forEach(c=>{ if(!byRound[c.rodada])byRound[c.rodada]=[]; byRound[c.rodada].push(c); });

  let html='';

  Object.keys(byRound).forEach(r=>{
    const ms=byRound[r];
    const done=ms.filter(m=>m.status==='concluido').length;
    const leg=ms[0]?.leg;
    html+=`<div class="rodada-section">
      <div class="rodada-header">
        <span class="rodada-title">Rodada ${r}</span>
        <div style="display:flex;gap:12px;align-items:center;">
          <span class="rodada-leg">${leg==='volta'?'🔄 Volta':'➡️ Ida'}</span>
          <span class="rodada-prog">${done}/${ms.length} concluídos</span>
        </div>
      </div>
      ${ms.map(m=>{
        const eq1=nEq(m.equipe1Id), eq2=nEq(m.equipe2Id);
        const rowCls=m.status==='ao_vivo'?'ao-vivo':m.status==='concluido'?'concluido':'';
        let scoreTxt='', badge='', catHtml='';

        if(m.status==='concluido'&&m.resultado){
          const v1=m.resultado.vitoriasEq1||0, v2=m.resultado.vitoriasEq2||0;
          scoreTxt=`<div class="conf-score">${v1} × ${v2}</div>`;
          badge=`<span class="badge b-done">✅ Concluído</span>`;
          const cats=m.resultado.categorias||[];
          catHtml=`<div class="cat-results" style="grid-column:1/-1">${
            cats.map(cr=>{
              if(!cr||!cr.vencedor) return `<span class="cr cr-pend">${cr.categoria}: ?</span>`;
              if(cr.vencedor==='empate') return `<span class="cr cr-emp">${cr.categoria}: Emp</span>`;
              const nome=(cr.vencedor==='1'?eq1:eq2).split(' ')[0];
              const cls=cr.vencedor==='1'?'cr-1':'cr-2';
              return `<span class="cr ${cls}">${cr.categoria}: ${nome}${cr.finalizacao?' 🔒':''}</span>`;
            }).join('')
          }</div>`;
        } else if(m.status==='ao_vivo'&&m.resultado){
          const v1=m.resultado.vitoriasEq1||0, v2=m.resultado.vitoriasEq2||0;
          scoreTxt=`<div class="conf-score" style="color:var(--verde)">${v1} × ${v2}</div>`;
          badge=`<span class="badge b-live">🔴 Ao Vivo</span>`;
        } else {
          scoreTxt=`<div class="conf-score conf-score-pend">× </div>`;
          badge=`<span class="badge b-pend">⏳ Pendente</span>`;
        }

        return `<div class="conf-row ${rowCls}" style="${m.status==='ao_vivo'?'display:grid':''}">
          <div>
            <div class="conf-eq">${eq1}</div>
            <div class="conf-sub">Casa</div>
          </div>
          ${scoreTxt}
          <div class="conf-eq-r">
            <div class="conf-eq">${eq2}</div>
            <div class="conf-sub">Visitante</div>
          </div>
          <div class="conf-meta">
            ${badge}
            <span>📅 ${m.data||'—'} ${m.hora||''}</span>
            <span>📍 ${m.local||'—'}</span>
          </div>
          ${catHtml}
        </div>`;
      }).join('')}
    </div>`;
  });

  // Classificação rápida
  const eqIds=[...new Set(confsF.flatMap(c=>[c.equipe1Id,c.equipe2Id]))];
  const eqsF=equipes.filter(e=>eqIds.includes(e.id));
  if(eqsF.length){
    const stats={};
    eqsF.forEach(e=>{stats[e.id]={eq:e,j:0,v:0,emp:0,d:0,pts:0};});
    confsF.filter(c=>c.status==='concluido'&&c.resultado).forEach(c=>{
      const s1=stats[c.equipe1Id],s2=stats[c.equipe2Id]; if(!s1||!s2)return;
      const v1=c.resultado.vitoriasEq1||0,v2=c.resultado.vitoriasEq2||0;
      s1.j++;s2.j++;
      if(v1>v2){s1.v++;s2.d++;s1.pts+=3;}else if(v2>v1){s2.v++;s1.d++;s2.pts+=3;}else{s1.emp++;s2.emp++;s1.pts+=1;s2.pts+=1;}
    });
    const ranked=Object.values(stats).sort((a,b)=>b.pts-a.pts||b.v-a.v);
    const medals=['🥇','🥈','🥉'];
    html+=`<div class="table-card">
      <div class="table-card-header">📊 CLASSIFICAÇÃO — ${(FL[faixaAtiva]||faixaAtiva).toUpperCase()}</div>
      <div class="trow th"><span>#</span><span>Equipe</span><span>V</span><span>E</span><span>D</span><span>J</span><span>Pts</span></div>
      ${ranked.map((s,i)=>{
        const logoHtml = s.eq.logoBase64
          ? `<img src="${s.eq.logoBase64}" style="width:20px;height:20px;object-fit:contain;border-radius:3px;flex-shrink:0;">`
          : '';
        return `<div class="trow ${i===0?'tr-gold':i===1?'tr-silver':''}">
          <span class="tr-pos">${medals[i]||(i+1)+'º'}</span>
          <span class="tr-nome" style="display:flex;align-items:center;gap:6px">${logoHtml}${s.eq.nome}</span>
          <span class="tr-n tr-v">${s.v}</span>
          <span class="tr-n" style="color:var(--laranja)">${s.emp}</span>
          <span class="tr-n tr-d">${s.d}</span>
          <span class="tr-n">${s.j}</span>
          <span class="tr-pts">${s.pts}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('main').innerHTML=html;
}

window.setFaixa=function(f){ faixaAtiva=f; render(); };

render();
setInterval(render, 5000);
window.addEventListener('storage',e=>{ if(e.key===KEY) render(); });
</script>
<script src="js/install-prompt.js"></script>
</body>
</html>
