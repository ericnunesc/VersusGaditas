<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/logo-budoflow.png">
  <link rel="apple-touch-icon" href="images/logo-budoflow.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - COMPETIÇÃO BJJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { font-size: 2.5rem; }
        .logo h1 { font-size: 1.1rem; font-weight: 700; color: #1A2C3E; margin-top: 8px; }
        .logo p { font-size: 0.72rem; color: #8A9CB0; margin-top: 2px; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #1A2C3E; margin-bottom: 6px; }
        input {
            width: 100%;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.88rem;
            color: #1A2C3E;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #C9A03D; }
        button {
            width: 100%;
            background: #C9A03D;
            border: none;
            border-radius: 40px;
            padding: 11px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        button:hover { background: #A0822E; }
        .erro {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #DC2626;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <img src="images/logo-budoflow.png" alt="BudoFlow" style="height:68px;width:auto;border-radius:50%;display:block;margin:0 auto;">
            <h1>COMPETIÇÃO BJJ</h1>
            <p>Sistema oficial CBJJ/IBJJF</p>
        </div>
        <div class="erro" id="erro">Usuário ou senha incorretos.</div>
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="admin" autocomplete="username">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••" autocomplete="current-password">
        <button onclick="entrar()">Entrar</button>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('senha').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') entrar();
        });
        function entrar() {
            const u = document.getElementById('usuario').value.trim();
            const s = document.getElementById('senha').value;
            if (fazerLogin(u, s)) {
                window.location.replace('painel.html');
            } else {
                document.getElementById('erro').style.display = 'block';
            }
        }
    </script>
</body>
</html>
